services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: governance
      POSTGRES_PASSWORD: governance_dev
      POSTGRES_DB: ai_governance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U governance -d ai_governance"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://governance:governance_dev@postgres:5432/ai_governance
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      # Provide your actual frontend origin(s) via env or compose override.
      CORS_ORIGINS: "${CORS_ORIGINS}"
      FRONTEND_URL: "${FRONTEND_URL}"
      DEFAULT_ORG_ID: "${DEFAULT_ORG_ID}"
      INFRA_COST_PER_MS_USD: "${INFRA_COST_PER_MS_USD}"
      POLICY_SECRET_KEYWORDS: "${POLICY_SECRET_KEYWORDS}"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://governance:governance_dev@postgres:5432/ai_governance
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app worker --loglevel=info --beat

volumes:
  pgdata:
